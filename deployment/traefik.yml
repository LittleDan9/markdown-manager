# ==============================================================================
# Traefik Static Configuration
# ==============================================================================
# DEPRECATED — This file has moved to platform-manager.
# Kept here for reference only. The active copy is in platform-manager/deployment/traefik.yml.
# Traefik acts as the entry point on port 8080 (replacing the container nginx
# port binding) and routes to whichever blue/green app stack is healthy.
# ==============================================================================

# Entry points
entryPoints:
  web:
    address: ":80"
    transport:
      respondingTimeouts:
        readTimeout: "600s"    # Match SSE/chat streaming timeouts
        writeTimeout: "600s"
        idleTimeout: "180s"

# Docker provider — discovers services via labels
providers:
  docker:
    exposedByDefault: false
    network: shared-services
    # Watch for container start/stop events
    watch: true

# Health check and API dashboard
api:
  dashboard: true
  insecure: true   # Dashboard on :8080 (internal only, behind host nginx)

# Logging
log:
  level: "WARN"

accessLog:
  bufferingSize: 100

# Health check endpoint for Traefik itself
ping:
  entryPoint: "web"

# Retry on connection errors (helps during blue/green transition)
serversTransport:
  maxIdleConnsPerHost: 200
