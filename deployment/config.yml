# ==============================================================================
# Markdown Manager — Deployment Configuration
# ==============================================================================
# Simplified config for Docker Compose-based production deployment.
# All service-level config is now in docker-compose.prod.yml.
# ==============================================================================

# Application directory on the remote server
app_dir: /opt/markdown-manager

# Compose file to use
compose_file: docker-compose.prod.yml

# Database defaults (can be overridden via production.env)
postgres_user: markdown_manager