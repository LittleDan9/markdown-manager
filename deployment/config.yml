---
# ==============================================================================
# Markdown Manager — Deployment Configuration
# ==============================================================================
# Blue/green deployment via Docker Compose + Traefik.
#
# Infrastructure stack (docker-compose.infra.yml) runs under project "mm-infra".
# Application stack (docker-compose.app.yml) alternates between "mm-blue"/"mm-green".
# ==============================================================================

# Application directory on the remote server
app_dir: /opt/markdown-manager

# Compose files
infra_compose_file: docker-compose.infra.yml
app_compose_file: docker-compose.app.yml

# Legacy compose file (kept for reference/fallback)
compose_file: docker-compose.prod.yml

# Database defaults (can be overridden via production.env)
postgres_user: markdown_manager