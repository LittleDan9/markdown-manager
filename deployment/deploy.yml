---
# ==============================================================================
# Markdown Manager — Production Deployment Playbook
# ==============================================================================
# Usage:
#   ansible-playbook -i inventory.yml deploy.yml              # Full deploy
#   ansible-playbook -i inventory.yml deploy.yml --tags deploy # Update only
#   ansible-playbook -i inventory.yml deploy.yml --tags bootstrap # First-time setup
#   ansible-playbook -i inventory.yml deploy.yml --tags nginx  # Nginx config only
#
# Variables:
#   -e force_rebuild=true    # Force Docker image rebuild
#   -e force_migrate=true   # Force database migration
# ==============================================================================

- name: Deploy Markdown Manager
  hosts: production
  become: false
  vars_files:
    - config.yml

  pre_tasks:
    - name: Display deployment info
      debug:
        msg: "Deploying to {{ inventory_hostname }} ({{ app_dir }})"

    - name: Validate production.env exists locally
      delegate_to: localhost
      stat:
        path: "{{ playbook_dir }}/production.env"
      register: env_file_check

    - name: Fail if production.env is missing
      fail:
        msg: >
          deployment/production.env not found.
          Copy deployment/production.env.template to deployment/production.env
          and fill in actual values.
      when: not env_file_check.stat.exists

  tasks:
    - name: Bootstrap server
      import_role:
        name: bootstrap
      tags: [bootstrap]

    - name: Deploy application
      import_role:
        name: app_deploy
      tags: [deploy]

    - name: Configure host nginx
      import_role:
        name: nginx_host
      tags: [nginx]

  post_tasks:
    - name: Deployment complete
      debug:
        msg: |
          Deployment completed successfully!
          Host: {{ inventory_hostname }}
          App: {{ app_dir }}
          Stack: docker compose -f docker-compose.prod.yml