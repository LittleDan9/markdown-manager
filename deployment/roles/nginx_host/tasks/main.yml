---
# Nginx host role — Deploy docs.littledan.com site config
#
# Deploys the app-specific host nginx site config for docs.littledan.com.
# Nginx base install, shared conf.d, and error pages are managed by
# platform-manager's nginx_base role.

- name: Deploy docs.littledan.com site configuration
  become: true
  template:
    src: docs.littledan.com.conf.j2
    dest: /etc/nginx/sites-available/docs.littledan.com.conf
    mode: "0644"
  notify: reload nginx

- name: Enable docs.littledan.com site
  become: true
  file:
    src: /etc/nginx/sites-available/docs.littledan.com.conf
    dest: /etc/nginx/sites-enabled/docs.littledan.com.conf
    state: link
  notify: reload nginx

- name: Test nginx configuration
  become: true
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Display nginx test result
  debug:
    msg: "{{ nginx_test.stderr_lines }}"
