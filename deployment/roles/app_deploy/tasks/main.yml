---
# App deploy role — Blue/green zero-downtime deployment
#
# This role:
# 1. Rsyncs the project source to the server
# 2. Deploys the production .env file
# 3. Verifies shared infrastructure (platform-manager) is running
# 4. Runs blue/green deployment (build → start new → health check → stop old)
# 5. Migrations run automatically in backend entrypoint.sh

- name: Sync project source to server
  synchronize:
    src: "{{ playbook_dir }}/../"
    dest: "{{ app_dir }}/"
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=node_modules"
      - "--exclude=__pycache__"
      - "--exclude=.venv"
      - "--exclude=*.pyc"
      - "--exclude=coverage"
      - "--exclude=.pytest_cache"
      - "--exclude=.mypy_cache"
      - "--exclude=core.*"
      - "--exclude=services/backend/postgres-data"
      - "--exclude=redis-data"
      - "--exclude=/storage"
      - "--exclude=backup-*"
      - "--exclude=deployment/production.env"
      - "--exclude=deployment/logs"
      - "--exclude=services/ui/node_modules"
      - "--exclude=services/ui/dist"
      - "--exclude=services/ui/coverage"
      - "--exclude=ollama-data"
      - "--exclude=.deploy-slot"
    delete: true
    recursive: true
  register: sync_result

- name: Deploy production environment file
  copy:
    src: "{{ playbook_dir }}/production.env"
    dest: "{{ app_dir }}/deployment/production.env"
    mode: "0600"
  register: env_result

- name: Verify shared infrastructure is running
  command: docker compose -p platform ps --status running
  register: infra_check
  changed_when: false
  failed_when: "'traefik' not in infra_check.stdout or 'db' not in infra_check.stdout"

- name: Wait for database to be healthy
  command: >
    docker exec platform-db-1
    pg_isready -U {{ postgres_user | default('markdown_manager') }}
  register: db_health
  retries: 15
  delay: 2
  until: db_health.rc == 0

- name: Run blue/green deployment
  command: "{{ app_dir }}/scripts/deploy-blue-green.sh {{ deploy_flags | default('') }}"
  args:
    chdir: "{{ app_dir }}"
  register: deploy_result
  when: sync_result.changed or force_rebuild | default(false) or force_deploy | default(false)
  environment:
    APP_DIR: "{{ app_dir }}"

- name: Show deploy output
  debug:
    msg: "{{ deploy_result.stdout_lines | default(['No deployment needed (no source changes)']) }}"

- name: Display active slot
  command: cat {{ app_dir }}/.deploy-slot
  register: slot_output
  changed_when: false
  failed_when: false

- name: Show active slot
  debug:
    msg: "Active deployment slot: {{ slot_output.stdout | default('unknown') }}"

- name: Wait for backend health check via Traefik
  ansible.builtin.command:
    cmd: curl -sf -H "Host: littledan.com" http://localhost:8080/ -o /dev/null
  register: health_check
  retries: 10
  delay: 5
  until: health_check.rc == 0
  changed_when: false
