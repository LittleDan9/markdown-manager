---
# App deploy role — Sync source, build images, and bring up the stack
#
# Replaces old roles: docker_service, redis, ui_deployment, cleanup
#
# This role:
# 1. Rsyncs the project source to the server
# 2. Deploys the production .env file
# 3. Builds all Docker images on the server
# 4. Brings up the Docker Compose stack
# 5. Runs database migrations
# 6. Cleans up old Docker artifacts

- name: Sync project source to server
  synchronize:
    src: "{{ playbook_dir }}/../"
    dest: "{{ app_dir }}/"
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=node_modules"
      - "--exclude=__pycache__"
      - "--exclude=.venv"
      - "--exclude=*.pyc"
      - "--exclude=coverage"
      - "--exclude=.pytest_cache"
      - "--exclude=.mypy_cache"
      - "--exclude=core.*"
      - "--exclude=services/backend/postgres-data"
      - "--exclude=redis-data"
      - "--exclude=/storage"
      - "--exclude=backup-*"
      - "--exclude=deployment/production.env"
      - "--exclude=deployment/logs"
      - "--exclude=services/ui/node_modules"
      - "--exclude=services/ui/dist"
      - "--exclude=services/ui/coverage"
      - "--exclude=ollama-data"
    delete: true
    recursive: true
  register: sync_result

- name: Deploy production environment file
  copy:
    src: "{{ playbook_dir }}/production.env"
    dest: "{{ app_dir }}/deployment/production.env"
    mode: "0600"
  register: env_result

- name: Build Docker images
  command: docker compose -f docker-compose.prod.yml --env-file deployment/production.env build
  args:
    chdir: "{{ app_dir }}"
  register: build_result
  when: sync_result.changed or force_rebuild | default(false)

- name: Clean stale files from UI volume before rebuild
  command: >
    docker run --rm -v mm-ui-static:/output alpine sh -c "rm -rf /output/*"
  args:
    chdir: "{{ app_dir }}"
  when: sync_result.changed or force_rebuild | default(false)

- name: Start Docker Compose stack
  command: docker compose -f docker-compose.prod.yml --env-file deployment/production.env up -d
  args:
    chdir: "{{ app_dir }}"
  register: compose_result

- name: Restart nginx to pick up new UI assets and refresh upstream DNS
  command: docker restart markdown-manager-nginx-1
  args:
    chdir: "{{ app_dir }}"
  when: sync_result.changed or force_rebuild | default(false)

- name: Wait for database to be healthy
  command: >
    docker compose -f docker-compose.prod.yml --env-file deployment/production.env exec -T db
    pg_isready -U {{ postgres_user | default('markdown_manager') }}
  args:
    chdir: "{{ app_dir }}"
  register: db_health
  retries: 15
  delay: 2
  until: db_health.rc == 0

- name: Run database migrations
  command: >
    docker compose -f docker-compose.prod.yml --env-file deployment/production.env exec -T backend
    /markdown-manager/.venv/bin/alembic upgrade head
  args:
    chdir: "{{ app_dir }}"
  register: migration_result
  when: sync_result.changed or force_migrate | default(false)

- name: Wait for backend health check
  uri:
    url: "http://localhost:8080/api/health"
    method: GET
    status_code: 200
  register: health_check
  retries: 10
  delay: 5
  until: health_check.status == 200

- name: Display running containers
  command: docker compose -f docker-compose.prod.yml --env-file deployment/production.env ps
  args:
    chdir: "{{ app_dir }}"
  register: ps_output
  changed_when: false

- name: Show container status
  debug:
    msg: "{{ ps_output.stdout_lines }}"

- name: Clean up old Docker artifacts
  command: docker system prune -f
  register: prune_result
  changed_when: "'Total reclaimed space: 0B' not in prune_result.stdout"

- name: Display cleanup result
  debug:
    msg: "{{ prune_result.stdout_lines | last }}"
  when: prune_result.changed
