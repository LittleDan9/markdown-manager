---
# Inventory for Markdown Manager deployment
# Default target: danbian (10.0.1.51)
#
# To deploy to a different host:
#   make deploy HOST=192.168.1.50
production:
  hosts:
    danbian:
      ansible_host: "{{ target_ip | default('10.0.1.51') }}"
      ansible_user: dlittle
      ansible_ssh_private_key_file: ~/.ssh/id_danbian
      ansible_python_interpreter: /usr/bin/python3
      ansible_become_method: sudo
      ansible_become_user: root