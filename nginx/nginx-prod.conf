# Nginx production configuration
# Container-level reverse proxy for the Markdown Manager stack
# Serves UI static files and routes API traffic to backend services
#
# This runs INSIDE the Docker Compose stack on port 80 (mapped to host 8080).
# The host-level nginx proxy-passes to this container.

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Include conf.d files (rate limiting, bot blocking, etc.)
    include /etc/nginx/conf.d/*.conf;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 80;
        server_name _;

        root /var/www/html;
        index index.html;

        # Docker DNS resolver — re-resolve service names when containers restart
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Upstream variables (force DNS re-resolution per request) ────
        set $upstream_backend    http://backend:8000;
        set $upstream_spellcheck http://spell-check:8003;
        set $upstream_export     http://export:8001;
        set $upstream_linting    http://linting:8002;

        # ── Spell check service ─────────────────────────────────────────
        location /api/spell-check/ {
            rewrite ^/api/spell-check/(.*)$ /$1 break;
            proxy_pass $upstream_spellcheck;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Export service ──────────────────────────────────────────────
        location /api/export/ {
            rewrite ^/api/export/(.*)$ /$1 break;
            proxy_pass $upstream_export;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Markdown lint (user/category/folder routes → backend) ──────
        location ~ ^/api/markdown-lint/(user|categories|folders)/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Markdown lint (general routes → linting service) ───────────
        location /api/markdown-lint/ {
            rewrite ^/api/markdown-lint/(.*)$ /$1 break;
            proxy_pass $upstream_linting;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Backend API (catch-all /api/) ──────────────────────────────
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # ── Export service (legacy /export/ path) ──────────────────────
        location /export/ {
            rewrite ^/export/(.*)$ /$1 break;
            proxy_pass $upstream_export;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Static assets with cache headers ───────────────────────────
        # Negative lookahead excludes /api/ paths so image API requests
        # are proxied to the backend instead of matched here as static files.
        location ~* ^(?!/api/).*\.(?:ico|css|js|map|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # ── Frontend SPA (must come after API routes) ──────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Block sensitive files ──────────────────────────────────────
        location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|bak|backup|old|tmp|temp)$ {
            return 444;
        }

        location ~ /\. {
            return 444;
        }
    }
}
