# Nginx production configuration
# Container-level reverse proxy for the Markdown Manager stack
# Serves UI static files and routes API traffic to backend services
#
# ARCHITECTURE — dual-nginx setup:
#   Host nginx    (littledan.com.conf.j2, Certbot, port 443→8080)
#     └── Container nginx  (this file, port 80 inside Docker, mapped 8080)
#           ├── backend:8000
#           ├── export:8001
#           ├── linting:8002
#           └── spell-check:8003
#
# Responsibilities of THIS layer (see nginx/README.md for the full split):
#   ✔ Path-based routing to Docker Compose services by name
#   ✔ Path rewriting  (/api/spell-check/* → /* on spell-check, etc.)
#   ✔ Static SPA file serving from /var/www/html
#   ✔ Per-service timeout and body-size tuning
#   ✔ Upstream DNS re-resolution for container restarts
#   ✔ Proxy buffering for large responses
#
# NOT handled here (host nginx does this before traffic reaches us):
#   ✘ Rate limiting / connection limiting
#   ✘ Bot / user-agent blocking
#   ✘ Security headers (CSP, HSTS, X-Frame-Options, etc.)
#   ✘ TLS termination
#   ✘ Query-string sanitisation
#   ✘ Sensitive-file blocking

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip — used for static file serving and pre-compressed .gz assets.
    # Client-facing compression is handled by the host nginx.
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 80;
        server_name _;

        # Global body size limit — applied to any location that doesn't override it.
        client_max_body_size 50m;

        root /var/www/html;
        index index.html;

        # Docker DNS resolver — re-resolve service names when containers restart
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Upstream variables (force DNS re-resolution per request) ────
        set $upstream_backend    http://backend:8000;
        set $upstream_spellcheck http://spell-check:8003;
        set $upstream_export     http://export:8001;
        set $upstream_linting    http://linting:8002;

        # ── Proxy headers — pass through real-client values set by host nginx ──
        # $remote_addr here is 127.0.0.1 (the host nginx loopback), not the real
        # client.  The host nginx already set X-Real-IP and X-Forwarded-For
        # correctly, so we forward those values unchanged.
        # Likewise, $scheme is always "http" here (TLS terminates at the host),
        # so we forward $http_x_forwarded_proto instead.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $http_x_forwarded_host;

        # ── Spell check service ─────────────────────────────────────────
        location /api/spell-check/ {
            rewrite ^/api/spell-check/(.*)$ /$1 break;
            proxy_pass $upstream_spellcheck;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Export service ──────────────────────────────────────────────
        location /api/export/ {
            rewrite ^/api/export/(.*)$ /$1 break;
            proxy_pass $upstream_export;
            client_max_body_size 50m;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Markdown lint (user/category/folder routes → backend) ──────
        location ~ ^/api/markdown-lint/(user|categories|folders)/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream_backend;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Markdown lint (general routes → linting service) ───────────
        location /api/markdown-lint/ {
            rewrite ^/api/markdown-lint/(.*)$ /$1 break;
            proxy_pass $upstream_linting;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Backend API (catch-all /api/) ──────────────────────────────
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $upstream_backend;
            client_max_body_size 50m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # ── Export service (legacy /export/ path) ──────────────────────
        location /export/ {
            rewrite ^/export/(.*)$ /$1 break;
            proxy_pass $upstream_export;
            client_max_body_size 50m;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Static assets ───────────────────────────────────────────────
        # Negative lookahead excludes /api/ paths so image API requests
        # are proxied to the backend instead of matched here as static files.
        location ~* ^(?!/api/).*\.(?:ico|css|js|map|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # ── Frontend SPA (must come after API routes) ──────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
