# ==============================================================================
# Docker Compose — Markdown Manager (Development)
# ==============================================================================
# Shared infrastructure (db, redis, ollama, embedding, clamav, export) is
# provided by Platform Manager on the shared-services network.
# Run `make dev` to automatically start Platform Manager first.
# ==============================================================================

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/scripts:/etc/nginx/scripts:ro
      - ./nginx/error-pages:/etc/nginx/error-pages:ro
    depends_on:
      - backend
    networks:
      - default
      - shared-services

  frontend:
    image: node:24
    working_dir: /app
    volumes:
      - ./services/ui:/app
      - type: tmpfs
        target: /app/node_modules/.cache
        tmpfs:
          size: 5368709120  # 5 GiB
    ports:
      - "3000:3000"
    command: sh -c "npm install && CHOKIDAR_USEPOLLING=true npm run serve"
    environment:
      - CHOKIDAR_USEPOLLING=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      - backend
      - nginx
    init: true

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    image: backend
    tmpfs:
      - /tmp  # for FastAPI temp files
    working_dir: /markdown_manager
    volumes:
      - ./services/backend/app:/markdown_manager/app
      - ./services/backend/migrations/:/markdown_manager/migrations/
      - ./services/backend/markdown_manager.db:/markdown_manager/markdown_manager.db
      - ./services/backend/alembic.ini:/markdown_manager/alembic.ini
      # Volume mount for filesystem-based document storage
      - ./storage:/documents
    ports:
      - "8000:8000"
    env_file:
      - ./services/backend/.env
    environment:
      - POETRY_VIRTUALENVS_IN_PROJECT=true
      - DEBUG_PASSWORD_RESET_TOKEN=true
      - MARKDOWN_STORAGE_ROOT=/documents
      - EMBEDDING_SERVICE_URL=http://embedding:8005
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-4}
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - CROSS_APP_SECRET=dev-cross-app-secret-change-in-production
      - TM_BACKEND_URL=http://tm-backend:8010
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      spell-check:
        condition: service_healthy
      linting:
        condition: service_healthy
    networks:
      - default
      - shared-services

  # Export, Embedding, Ollama, ClamAV, DB, and Redis are provided by
  # Platform Manager on the shared-services network.

  linting:
    build:
      context: ./services/linting
      dockerfile: Dockerfile
    environment:
      - MARKDOWN_LINT_PORT=8002
      - NODE_ENV=development
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  spell-check:
    build:
      context: ./services/spell-check
      dockerfile: Dockerfile
    environment:
      - SPELL_CHECK_PORT=8003
      - NODE_ENV=development
      - BACKEND_URL=http://backend:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPELL_DB_HOST=db
      - SPELL_DB_PORT=5432
      - SPELL_DB_NAME=markdown_manager
      - SPELL_DB_USER=postgres
      - SPELL_DB_PASSWORD=postgres
    ports:
      - "8003:8003"
    volumes:
      - ./services/spell-check/server.js:/app/server.js
      - ./services/spell-check/lib:/app/lib
      - ./services/spell-check/routes:/app/routes
      - ./services/spell-check/services:/app/services
      - ./services/spell-check/middleware:/app/middleware
      - ./services/spell-check/utils:/app/utils
      - ./services/spell-check/config:/app/config:ro
      - ./services/spell-check/dictionaries:/app/dictionaries:ro
    command: ["npm", "run", "dev"]     # Use nodemon for development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - default
      - shared-services

  event-publisher:
    build:
      context: ./services/event-publisher
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - RELAY_DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/markdown_manager
      - RELAY_REDIS_URL=redis://redis:6379/0
      - RELAY_BATCH_SIZE=50
      - RELAY_POLL_INTERVAL=5
      - RELAY_MAX_RETRY_ATTEMPTS=5
      - RELAY_LOG_LEVEL=INFO
      - RELAY_HTTP_PORT=8004
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - default
      - shared-services

  linting-consumer:
    build:
      context: .
      dockerfile: ./services/event-consumer/Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/markdown_manager
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./services/linting/consumer.config.json:/app/config/consumer.config.json:ro
    depends_on:
      event-publisher:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; import redis.asyncio; asyncio.run(redis.asyncio.from_url('redis://redis:6379').ping())"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - default
      - shared-services

  spell-check-consumer:
    build:
      context: .
      dockerfile: ./services/event-consumer/Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/markdown_manager
      - REDIS_URL=redis://redis:6379/0
      - SPELL_CONSUMER_LOG_LEVEL=INFO
    volumes:
      - ./services/spell-check/consumer.config.json:/app/config/consumer.config.json:ro
    depends_on:
      event-publisher:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; import redis.asyncio; asyncio.run(redis.asyncio.from_url('redis://redis:6379').ping())"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - default
      - shared-services

# ==============================================================================
# Network — shared-services is created/managed by Platform Manager
# ==============================================================================
networks:
  shared-services:
    name: shared-services
    external: true
