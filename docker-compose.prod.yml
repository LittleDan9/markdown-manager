# ==============================================================================
# Docker Compose - Production (LEGACY — kept for reference/fallback)
# ==============================================================================
# DEPRECATED: This monolithic compose file has been replaced by:
#   docker-compose.app.yml    — Application services (blue/green deployed)
#   platform-manager          — Shared infrastructure (db, redis, ollama, etc.)
#   docker-compose.app.yml    — Application (backend, nginx, export, etc.)
#
# The new files support blue/green zero-downtime deployment via Traefik.
# See deployment/README.md for details.
#
# This file is retained as a working fallback. To use it directly:
#   docker compose -f docker-compose.prod.yml --env-file deployment/production.env up -d
#   docker compose -f docker-compose.prod.yml --env-file deployment/production.env logs -f
#   docker compose -f docker-compose.prod.yml --env-file deployment/production.env down
#
# Requires: deployment/production.env (see deployment/production.env.template)
# ==============================================================================

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Reverse proxy — serves UI static files and routes API traffic
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/error-pages:/etc/nginx/error-pages:ro
      - ui-static:/var/www/html:ro
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # UI build — builds React app then exits; output goes to shared volume
  # ──────────────────────────────────────────────────────────────────────────
  frontend-build:
    build:
      context: ./services/ui
      dockerfile: Dockerfile
    volumes:
      - ui-static:/output
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-markdown_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-markdown_manager}
    env_file:
      - ./deployment/production.env
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-markdown_manager} -d ${POSTGRES_DB:-markdown_manager}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Redis — event streams + cache
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Backend — FastAPI main API
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./deployment/production.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-markdown_manager}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-markdown_manager}
      - REDIS_URL=redis://redis:6379/0
      - EXPORT_SERVICE_URL=http://export:8001
      - MARKDOWN_LINT_SERVICE_URL=http://linting:8002
      - SPELL_CHECK_SERVICE_URL=http://spell-check:8003
      - MARKDOWN_STORAGE_ROOT=/documents
      - ENVIRONMENT=production
      - EMBEDDING_SERVICE_URL=http://embedding:8005
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-4}
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    volumes:
      - document-storage:/documents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      export:
        condition: service_healthy
      linting:
        condition: service_healthy
      spell-check:
        condition: service_healthy
      embedding:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Embedding microservice — sentence-transformers CPU inference
  # ──────────────────────────────────────────────────────────────────────────
  embedding:
    build:
      context: ./services/embedding
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Ollama — self-hosted LLM for document Q&A (qwen2.5:1.5b default, mistral available)
  # ──────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-4}
    healthcheck:
      test: ["CMD", "/usr/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "8.0"
    networks:
      - markdown-manager

  # One-shot container: pulls mistral on first deploy, exits immediately if already present.
  # The model is stored in the mm-ollama-data named volume so it survives redeployments.
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:1.5b && ollama pull mistral"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Export — PDF/SVG/PNG generation via Playwright
  # ──────────────────────────────────────────────────────────────────────────
  export:
    build:
      context: ./services/export
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - ICON_SERVICE_URL=http://backend:8000
      - DRAWIO_VERSION=${DRAWIO_VERSION:-24.7.5}
      - DRAWIO_QUALITY_THRESHOLD=${DRAWIO_QUALITY_THRESHOLD:-60.0}
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Linting — markdownlint HTTP service
  # ──────────────────────────────────────────────────────────────────────────
  linting:
    build:
      context: ./services/linting
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MARKDOWN_LINT_PORT=8002
      - NODE_ENV=production
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Spell check — cspell/retext HTTP service
  # ──────────────────────────────────────────────────────────────────────────
  spell-check:
    build:
      context: ./services/spell-check
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SPELL_CHECK_PORT=8003
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPELL_DB_HOST=db
      - SPELL_DB_PORT=5432
      - SPELL_DB_NAME=${POSTGRES_DB:-markdown_manager}
      - SPELL_DB_USER=${POSTGRES_USER:-markdown_manager}
      - SPELL_DB_PASSWORD=${POSTGRES_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://littledan.com,https://www.littledan.com}
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Event publisher — outbox relay (Postgres → Redis Streams)
  # ──────────────────────────────────────────────────────────────────────────
  event-publisher:
    build:
      context: ./services/event-publisher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - RELAY_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-markdown_manager}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-markdown_manager}
      - RELAY_REDIS_URL=redis://redis:6379/0
      - RELAY_BATCH_SIZE=50
      - RELAY_POLL_INTERVAL=5
      - RELAY_MAX_RETRY_ATTEMPTS=5
      - RELAY_LOG_LEVEL=INFO
      - ENVIRONMENT=production
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Linting consumer — projects identity events into linting schema
  # ──────────────────────────────────────────────────────────────────────────
  linting-consumer:
    build:
      context: .
      dockerfile: ./services/event-consumer/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-markdown_manager}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-markdown_manager}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    volumes:
      - ./services/linting/consumer.config.json:/app/config/consumer.config.json:ro
    depends_on:
      event-publisher:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # Spell-check consumer — projects identity events into spell_checking schema
  # ──────────────────────────────────────────────────────────────────────────
  spell-check-consumer:
    build:
      context: .
      dockerfile: ./services/event-consumer/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-markdown_manager}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-markdown_manager}
      - REDIS_URL=redis://redis:6379/0
      - SPELL_CONSUMER_LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - ./services/spell-check/consumer.config.json:/app/config/consumer.config.json:ro
    depends_on:
      event-publisher:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    networks:
      - markdown-manager

  # ──────────────────────────────────────────────────────────────────────────
  # ClamAV — virus scanning for file attachments
  # ──────────────────────────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    networks:
      - markdown-manager

# ==============================================================================
# Named volumes — persistent data survives container recreation
# ==============================================================================
volumes:
  postgres-data:
    name: mm-postgres-data
  redis-data:
    name: mm-redis-data
  document-storage:
    name: mm-document-storage
  ui-static:
    name: mm-ui-static
  ollama-data:
    name: mm-ollama-data
  clamav-data:
    name: mm-clamav-data

# ==============================================================================
# Network — all services communicate on internal network
# ==============================================================================
networks:
  markdown-manager:
    name: markdown-manager
    driver: bridge
